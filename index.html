<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LessonCraft</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
</head>
<body>

  <!-- TOPBAR: fixed, always 52px tall -->
  <header class="topbar">
    <div class="topbar-brand">
      <span id="appName">LessonCraft</span>
      <span id="appTagline">استخراج منهجي للدروس من الكتب المدرسية</span>
    </div>
    <div class="topbar-actions">
      <!-- Main nav tabs -->
      <nav class="topbar-nav" id="topbarNav">
        <button class="nav-tab active" data-panel="books" id="navBooks">📚 الكتب</button>
        <button class="nav-tab" data-panel="dashboard" id="navDashboard">📊 لوحة القيادة</button>
        <button class="nav-tab" data-panel="homework" id="navHomework">📝 الواجبات</button>
        <button class="nav-tab" data-panel="students" id="navStudents">🎓 الطلاب</button>
      </nav>
      <button id="langToggle" class="btn btn-ghost">EN</button>
    </div>
  </header>

  <!-- SIDEBAR: fixed left column (books list) -->
  <aside class="sidebar" id="sidebarBooks">
    <div class="sidebar-header">
      <span id="myBooksLabel" class="sidebar-label">كتبي</span>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button id="newBookBtn" class="btn btn-gold" style="flex:1">كتاب جديد</button>
        <button id="importBtn" class="btn btn-ghost" style="flex:1">استيراد JSON</button>
      </div>
      <span id="storageInfo"></span>
    </div>
    <!-- THIS scrolls -->
    <div id="bookList"></div>
    <input type="file" id="importInput" accept="application/json" style="display:none" />
  </aside>

  <!-- MAIN AREA: fixed, right of sidebar -->
  <main class="main-area">

    <!-- ── BOOKS SECTION ─────────────────────────────────────────────── -->
    <div id="booksSection" class="section-panel active-section">

      <!-- Upload screen -->
      <div id="uploadPanel">
        <h2 id="uploadTitle">ارفع كتاباً</h2>
        <div id="dropzone">
          <div class="dropzone-icon">📄</div>
          <p id="uploadHint">اسحب ملف PDF هنا أو انقر للاختيار</p>
          <input type="file" id="fileInput" accept="application/pdf" style="display:none" />
        </div>
        <div id="metaForm" class="hidden">
          <span id="metaFileName"></span>
          <div class="form-group">
            <label id="inputTitleLabel" class="form-label" for="inputTitle">عنوان الكتاب</label>
            <input id="inputTitle" class="form-input" type="text" placeholder="مثال: رياضيات الصف الخامس الجزء الثاني" />
          </div>
          <div class="form-group">
            <label id="inputGradeLabel" class="form-label" for="inputGrade">الصف</label>
            <input id="inputGrade" class="form-input" type="text" placeholder="مثال: الخامس الابتدائي" />
          </div>
          <button id="metaSubmit" class="btn btn-gold">ابدأ الاستخراج</button>
        </div>
      </div>

      <!-- Progress screen -->
      <div id="progressPanel" class="hidden">
        <div class="progress-track"><div id="progressBar"></div></div>
        <span id="progressLabel"></span>
      </div>

      <!-- Viewer screen -->
      <div id="viewerPanel" class="hidden">

        <!-- Fixed header inside viewer -->
        <div class="viewer-header" id="viewerHeader">
          <div class="viewer-title-group">
            <span id="bookTitle"></span>
            <span id="bookSubtitle"></span>
          </div>
          <div class="viewer-actions">
            <button id="exportBtn" class="btn btn-sage">Export JSON</button>
            <button id="deleteBtn" class="btn btn-rust">Delete</button>
          </div>
        </div>

        <!-- Chapter column: fixed, scrollable -->
        <div class="chapter-col" id="chapterCol">
          <div class="col-heading" id="chaptersLabel">الفصول</div>
          <div id="chapterList"></div>
        </div>

        <!-- Lesson column: fixed, contains tabs + scrollable content -->
        <div class="lesson-col" id="lessonCol">
          <!-- Fixed tabs (lesson selector + view toggle) -->
          <div id="lessonTabs"></div>
          <!-- View mode tabs: Content / Summary / Homework -->
          <div id="lessonViewTabs" class="lesson-view-tabs">
            <button class="view-tab active" data-view="content" id="viewTabContent">المحتوى</button>
            <button class="view-tab" data-view="summary"  id="viewTabSummary">الملخص</button>
            <button class="view-tab" data-view="homework" id="viewTabHomework">إنشاء واجب</button>
          </div>
          <!-- THIS IS THE SCROLL CONTAINER — explicit top/bottom via JS -->
          <div id="lessonContent"></div>
        </div>

      </div>

    </div><!-- /booksSection -->

    <!-- ── DASHBOARD SECTION ──────────────────────────────────────────── -->
    <div id="dashboardSection" class="section-panel">
      <div id="dashboardContent" class="dashboard-wrap"></div>
    </div>

    <!-- ── HOMEWORK SECTION ───────────────────────────────────────────── -->
    <div id="homeworkSection" class="section-panel">
      <div class="panel-header">
        <h2 id="hwPanelTitle">الواجبات</h2>
      </div>
      <div id="homeworkListWrap" class="hw-list-wrap"></div>
    </div>

    <!-- ── STUDENTS SECTION ───────────────────────────────────────────── -->
    <div id="studentsSection" class="section-panel">
      <div class="panel-header">
        <h2 id="stPanelTitle">إدارة الطلاب</h2>
        <button id="addStudentBtn" class="btn btn-gold">+ إضافة طالب</button>
      </div>
      <!-- Add student form (hidden by default) -->
      <div id="addStudentForm" class="add-student-form hidden">
        <div class="form-row">
          <input id="stNameInput"  class="form-input" type="text" placeholder="اسم الطالب" />
          <input id="stGradeInput" class="form-input" type="text" placeholder="الصف (اختياري)" />
          <button id="stSaveBtn" class="btn btn-gold">حفظ</button>
          <button id="stCancelBtn" class="btn btn-ghost">إلغاء</button>
        </div>
      </div>
      <div id="studentListWrap" class="student-list-wrap"></div>
    </div>

  </main>

<script src="js/parser.js"></script>
<script src="js/detector.js"></script>
<script src="js/store.js"></script>
<script src="js/summarizer.js"></script>
<script src="js/students.js"></script>
<script src="js/app.js"></script>
</body>
</html>
